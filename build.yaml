---
include:
  # Standard build with nice_view shields
  - board: eyelash_sofle_left
    shield: nice_view_adapter nice_epaper
    artifact-name: eyelash_sofle_left_epaper
  - board: eyelash_sofle_right
    shield: nice_view_adapter nice_view_custom
    artifact-name: eyelash_sofle_right_custom
  
  # Alternate: just nice_view without adapter  
  - board: eyelash_sofle_left
    shield: nice_view
    artifact-name: eyelash_sofle_left_noview

  # ZMK Studio variant
  - board: eyelash_sofle_left
    shield: nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
    artifact-name: eyelash_sofle_studio_left

  # Settings reset
  - board: nice_nano_v2
    shield: settings_reset